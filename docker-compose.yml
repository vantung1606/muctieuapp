version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: muctieu_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: muctieudb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: muctieu_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/muctieudb?schema=public
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: muctieu_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - api

volumes:
  postgres_data:
